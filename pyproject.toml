# Workspace root — not a package. Shared tooling config for all members.
[tool.uv.workspace]
members = ["packages/*"]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "hypothesis>=6.100",
    "mypy>=1.10",
    "ruff>=0.8",
    "pre-commit>=4.0",
    "psycopg[binary]>=3.3.4",
    "mutmut>=3.6",
    # typed boto3 client + type_defs for effaced-s3 (boto3 ships no types)
    "types-boto3[s3]>=1.35",
    # the runnable FastAPI example + its tests (examples/fastapi-quickstart)
    "fastapi>=0.116",
    "httpx>=0.28",
    "uvicorn>=0.30",
]
docs = [
    "griffe>=1.5",
]

[tool.uv]
default-groups = ["dev", "docs"]

# ---------------------------------------------------------------------------
# Lint / format — ruff owns both. Shared by every workspace member.
# ---------------------------------------------------------------------------
[tool.ruff]
line-length = 100
target-version = "py311"
src = [
    "packages/effaced/src",
    "packages/effaced-stripe/src",
    "packages/effaced-supabase/src",
    "packages/effaced-s3/src",
]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "F",    # pyflakes
    "W",    # pycodestyle warnings
    "I",    # isort
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "C90",  # mccabe complexity — small, searchable units
    "SIM",  # flake8-simplify
    "S",    # flake8-bandit (security)
    "D",    # pydocstyle — docstrings are the future docs site
    "ANN",  # flake8-annotations — everything is explicitly typed
    "N",    # pep8-naming
    "A",    # flake8-builtins
    "ARG",  # unused arguments
    "ERA",  # no commented-out code
    "PL",   # pylint — size/complexity budgets per class/function
    "TID",  # tidy imports — no relative-import spaghetti
    "PTH",  # pathlib over os.path
    "RUF",  # ruff-specific
]
# the formatter owns line wrapping; leftovers are long strings it won't split
ignore = ["E501", "D203", "D213"]

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.ruff.lint.pylint]
max-args = 6
max-branches = 10
max-statements = 40
max-public-methods = 10

[tool.ruff.lint.flake8-tidy-imports]
ban-relative-imports = "all"

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.per-file-ignores]
# asserts are expected in tests; no docstring/annotation policing there;
# test doubles legitimately ignore arguments
"**/tests/**" = ["S101", "D", "ANN", "PLR2004", "ARG"]
# RUF012: SQLAlchemy's `__table_args__` is a plain class-level dict by
# convention; ClassVar conflicts with the DeclarativeBase stubs under mypy.
"examples/**" = ["D", "S", "ANN", "RUF012"]
"examples/**/test_*.py" = ["S101", "D", "ANN", "PLR2004", "ARG"]
# the conformance suite is shipped test code: asserts are its whole point
"packages/effaced/src/effaced/testing/**" = ["S101"]
# N803: the S3 client protocol mirrors the AWS wire API's CamelCase kwargs;
# renaming them would break structural compatibility with boto3 clients
"packages/effaced-s3/src/effaced_s3/object_client.py" = ["N803"]
# PLR0913: object_records maps one S3 object's distinct fields (key, size,
# content_type, last_modified, metadata, content) plus the source label — a
# data-shaped signature where each argument is a separate exported field
"packages/effaced-s3/src/effaced_s3/export_records.py" = ["PLR0913"]
# PLR0913: the storage resolver's __init__ carries the gateway connection
# tuple (endpoint, key id, secret, region) alongside the export knobs — the
# loud ConfigurationError guard depends on accepting them individually
"packages/effaced-supabase/src/effaced_supabase/storage_resolver.py" = ["PLR0913"]
# PLR0913: the fake client's constructor doubles as the test-scenario knob set
"packages/effaced-s3/tests/**" = ["N803", "PLR0913"]
# the supabase storage fake mirrors the same S3-gateway CamelCase wire kwargs
"packages/effaced-supabase/tests/fake_supabase_storage_client.py" = ["N803", "PLR0913"]

# ---------------------------------------------------------------------------
# Types — strict everywhere. PII machinery must not have untyped seams.
# ---------------------------------------------------------------------------
[tool.mypy]
python_version = "3.11"
strict = true
plugins = ["pydantic.mypy"]
warn_unreachable = true
warn_redundant_casts = true
strict_equality = true
extra_checks = true
disallow_any_unimported = true
show_error_codes = true
files = [
    "packages/effaced/src",
    "packages/effaced-stripe/src",
    "packages/effaced-supabase/src",
    "packages/effaced-s3/src",
    "scripts",
    "examples/fastapi-quickstart/app.py",
    "examples/fastapi-quickstart/models.py",
]

[tool.pydantic-mypy]
init_forbid_extra = true
init_typed = true
warn_required_dynamic_aliases = true

[[tool.mypy.overrides]]
module = "stripe.*"
ignore_missing_imports = true

# ---------------------------------------------------------------------------
# Tests
# ---------------------------------------------------------------------------
[tool.pytest.ini_options]
testpaths = [
    "packages/effaced/tests",
    "packages/effaced-stripe/tests",
    "packages/effaced-supabase/tests",
    "packages/effaced-s3/tests",
    "examples/fastapi-quickstart",
]
addopts = "-ra --strict-markers"
markers = [
    "integration: requires a real Postgres (CI service container); excluded by default runs",
    "property: hypothesis property-based tests",
]

[tool.coverage.run]
source = ["effaced", "effaced_stripe", "effaced_supabase", "effaced_s3"]
branch = true

[tool.coverage.report]
exclude_also = ["raise NotImplementedError"]
# an untested branch in an erasure library is a potential data-protection bug
fail_under = 95
show_missing = true
