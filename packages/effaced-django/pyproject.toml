[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "effaced-django"
version = "0.1.0"
description = "Django ORM adapter for effaced — author PII on Django models, run the effaced erasure/export engine."
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
license-files = ["LICENSE"]
authors = [{ name = "Justin Lanfermann", email = "Justin@Lanfermann.dev" }]
keywords = ["gdpr", "django", "privacy", "data-erasure", "effaced"]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Framework :: Django",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Security",
    "Typing :: Typed",
]
dependencies = [
    "effaced",
    "django>=4.2",
    "sqlalchemy>=2.0",
]

[project.urls]
Homepage = "https://effaced.dev"
Repository = "https://github.com/jaylann/effaced"
Issues = "https://github.com/jaylann/effaced/issues"
Changelog = "https://github.com/jaylann/effaced/blob/main/packages/effaced-django/CHANGELOG.md"

[tool.uv.sources]
effaced = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/effaced_django"]
