[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "effaced-supabase"
version = "0.0.0"
description = "Supabase resolver for effaced — export and erase a data subject's PII held in Supabase."
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
license-files = ["LICENSE"]
authors = [{ name = "Justin Lanfermann", email = "Justin@Lanfermann.dev" }]
keywords = ["gdpr", "supabase", "privacy", "data-erasure", "effaced"]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Security",
    "Typing :: Typed",
]
dependencies = [
    "effaced",
    # Everything used (Client(transport=...), MockTransport, raise_for_status)
    # is stable far earlier; 0.27 is a conservative modern floor.
    "httpx>=0.27",
]

# The storage resolver rides effaced-s3's S3-compatible machinery (ADR 0016).
# Auth-only installs stay httpx-only; opt in with effaced-supabase[storage].
[project.optional-dependencies]
storage = [
    "effaced-s3",
    "boto3>=1.35",
]

[project.urls]
Homepage = "https://effaced.dev"
Repository = "https://github.com/jaylann/effaced"
Issues = "https://github.com/jaylann/effaced/issues"
Changelog = "https://github.com/jaylann/effaced/blob/main/packages/effaced-supabase/CHANGELOG.md"

[tool.uv.sources]
effaced = { workspace = true }
effaced-s3 = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/effaced_supabase"]
