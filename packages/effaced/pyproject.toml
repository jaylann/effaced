[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "effaced"
version = "0.0.0"
description = "GDPR data-subject mechanisms — export, erasure, consent, and audit across your own database and the external systems you use. We ship the mechanisms. You own the compliance."
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
license-files = ["LICENSE"]
authors = [{ name = "Justin Lanfermann", email = "Justin@Lanfermann.dev" }]
keywords = [
    "gdpr",
    "privacy",
    "data-erasure",
    "dsar",
    "right-to-be-forgotten",
    "consent",
    "audit",
    "fastapi",
    "sqlalchemy",
    "postgres",
]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Security",
    "Topic :: Database",
    "Framework :: FastAPI",
    "Typing :: Typed",
]
dependencies = [
    "sqlalchemy>=2.0",
    "pydantic>=2.7",
]

[project.urls]
Homepage = "https://effaced.dev"
Repository = "https://github.com/jaylann/effaced"
Issues = "https://github.com/jaylann/effaced/issues"
Changelog = "https://github.com/jaylann/effaced/blob/main/packages/effaced/CHANGELOG.md"

[tool.hatch.build.targets.wheel]
packages = ["src/effaced"]
