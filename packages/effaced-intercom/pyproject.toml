[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "effaced-intercom"
version = "0.0.0"
description = "Intercom resolver for effaced — export and erase a data subject's profile and conversation metadata held in Intercom."
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
license-files = ["LICENSE"]
authors = [{ name = "Justin Lanfermann", email = "Justin@Lanfermann.dev" }]
keywords = ["gdpr", "intercom", "support", "privacy", "data-erasure", "effaced"]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Security",
    "Typing :: Typed",
]
dependencies = [
    "effaced",
    # Everything used (Client(transport=...), MockTransport, raise_for_status)
    # is stable far earlier; 0.27 is a conservative modern floor.
    "httpx>=0.27",
]

[project.urls]
Homepage = "https://effaced.dev"
Repository = "https://github.com/jaylann/effaced"
Issues = "https://github.com/jaylann/effaced/issues"
Changelog = "https://github.com/jaylann/effaced/blob/main/packages/effaced-intercom/CHANGELOG.md"

[tool.uv.sources]
effaced = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/effaced_intercom"]
