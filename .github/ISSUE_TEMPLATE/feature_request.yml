name: Feature request
description: Propose an improvement or new capability
labels: ["type:feat"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What can't you do (or do safely) today?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
