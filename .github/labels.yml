# Declarative label taxonomy — synced by .github/workflows/labels-sync.yml.
# Every PR/issue gets at least one type:* and the relevant area:* labels.

# --- type (matches Conventional Commits types) ---
- name: "type:feat"
  color: "0e8a16"
  description: "New capability"
- name: "type:fix"
  color: "d73a4a"
  description: "Bug fix"
- name: "type:chore"
  color: "cfd3d7"
  description: "Maintenance, deps, tooling"
- name: "type:docs"
  color: "0075ca"
  description: "Documentation only"
- name: "type:refactor"
  color: "a2eeef"
  description: "No behaviour change"
- name: "type:test"
  color: "f9d0c4"
  description: "Tests only"
- name: "type:perf"
  color: "fbca04"
  description: "Performance"
- name: "type:ci"
  color: "ededed"
  description: "CI/CD pipeline"

# --- area ---
- name: "area:annotations"
  color: "1d76db"
  description: "pii()/subject_link(), PiiSpec, retention"
- name: "area:manifest"
  color: "1d76db"
  description: "DataMap, schema versioning, migration"
- name: "area:export"
  color: "1d76db"
  description: "Art. 15 export engine"
- name: "area:erasure"
  color: "1d76db"
  description: "Art. 17 erasure engine"
- name: "area:consent"
  color: "1d76db"
  description: "Art. 7 consent ledger"
- name: "area:audit"
  color: "1d76db"
  description: "Audit trail and sinks"
- name: "area:resolvers"
  color: "1d76db"
  description: "Resolver interface & registry"
- name: "area:saga"
  color: "1d76db"
  description: "Outbox, runner, retries, idempotency"
- name: "area:stripe"
  color: "1d76db"
  description: "effaced-stripe package"
- name: "area:s3"
  color: "1d76db"
  description: "effaced-s3 package"
- name: "area:supabase"
  color: "1d76db"
  description: "effaced-supabase package"
- name: "area:adapters"
  color: "1d76db"
  description: "ORM/storage adapters"
- name: "area:docs"
  color: "1d76db"
  description: "READMEs, guides, ADRs"
- name: "area:ci"
  color: "1d76db"
  description: "Workflows, release automation"

# --- status / special ---
- name: "status:wip"
  color: "bfdadc"
  description: "Not ready for review"
- name: "status:blocked"
  color: "b60205"
  description: "Waiting on something external"
- name: "status:exploring"
  color: "d4c5f9"
  description: "Demand-pulled idea — scope notes, no commitment"
- name: "breaking"
  color: "b60205"
  description: "MAJOR: API, manifest format, or erasure/export behaviour change"
- name: "security"
  color: "b60205"
  description: "Data-protection or classic security relevance"
- name: "good first issue"
  color: "7057ff"
  description: "Self-contained starter task"
- name: "help wanted"
  color: "008672"
  description: "Maintainer would welcome a PR"
- name: "resolver-request"
  color: "5319e7"
  description: "Request for a new first-party resolver"
- name: "autorelease: pending"
  color: "ededed"
  description: "Managed by release-please"
- name: "autorelease: tagged"
  color: "ededed"
  description: "Managed by release-please"
