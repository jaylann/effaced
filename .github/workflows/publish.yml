# registered: PyPI trusted publishing per package tag
name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. effaced-v0.1.0)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      package: ${{ steps.resolve.outputs.package }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Resolve package from tag
        id: resolve
        env:
          TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag }}
        run: |
          case "$TAG" in
            effaced-stripe-v*) echo "package=effaced-stripe" >> "$GITHUB_OUTPUT" ;;
            effaced-v*)        echo "package=effaced"        >> "$GITHUB_OUTPUT" ;;
            *) echo "::error::Unrecognised tag '$TAG' — expected effaced-vX.Y.Z or effaced-stripe-vX.Y.Z"; exit 1 ;;
          esac

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Build sdist and wheel
        run: uv build --package "${{ steps.resolve.outputs.package }}" --out-dir dist

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist
          path: dist/

  publish:
    name: Publish ${{ needs.build.outputs.package }} (Trusted Publishing)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          skip-existing: true
