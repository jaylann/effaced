# Lints + tests the TypeScript manifest spike (packages-ts/, issue #62) on PRs
# that touch it. Mirrors docs.yml: path-filtered, pnpm-managed, and deliberately
# NOT a required check — a path-filtered check that skips would block merging
# forever (see ADR 0011). pnpm is pinned via packageManager in the root
# packages-ts/package.json; pnpm/action-setup reads it.
name: TS adapters

on:
  pull_request:
    branches: [stage, main]
    paths:
      - "packages-ts/**"
      - ".github/workflows/ts-adapters.yml"
  push:
    branches: [stage]
    paths:
      - "packages-ts/**"
      - ".github/workflows/ts-adapters.yml"

permissions:
  contents: read

concurrency:
  group: ts-adapters-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Lint and test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          package_json_file: packages-ts/package.json

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: packages-ts/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: packages-ts
        run: pnpm install --frozen-lockfile

      - name: Lint (tsc --noEmit)
        working-directory: packages-ts
        run: pnpm -r lint

      - name: Test (vitest)
        working-directory: packages-ts
        run: pnpm -r test

  roundtrip:
    name: Python round-trip
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Install the Python workspace
        run: uv sync --locked --package effaced

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          package_json_file: packages-ts/package.json

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: packages-ts/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: packages-ts
        run: pnpm install --frozen-lockfile

      - name: Round-trip emitted manifest through Python
        working-directory: packages-ts
        env:
          EFFACED_ROUNDTRIP: "1"
        run: pnpm -r test
