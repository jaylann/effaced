name: Sync stage from main

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: sync-stage
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # stage is PR-only; the lanfermann-release-bot app is a ruleset bypass
      # actor, so the sync push must authenticate as the app.
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ vars.RP_APP_ID }}
          private-key: ${{ secrets.RP_APP_KEY }}
          # least privilege: the sync only pushes a merge commit
          permission-contents: write

      # the push step needs the app token persisted in git config
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6 # zizmor: ignore[artipacked]
        with:
          ref: stage
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Merge main into stage and push
        run: |
          git config user.name "lanfermann-release-bot[bot]"
          git config user.email "lanfermann-release-bot[bot]@users.noreply.github.com"
          git fetch origin main
          if git merge-base --is-ancestor origin/main HEAD; then
            echo "stage already contains main — nothing to sync"
            exit 0
          fi
          git merge origin/main --no-edit
          git push origin stage
