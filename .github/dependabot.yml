version: 2
updates:
  - package-ecosystem: uv
    directory: "/"
    schedule:
      interval: weekly
    groups:
      python-dependencies:
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      github-actions:
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: "/site"
    schedule:
      interval: weekly
    groups:
      site-dependencies:
        update-types: [minor, patch]
